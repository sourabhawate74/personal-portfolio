# 1. Server & App Info
server.port=8080
spring.application.name=PortfolioBackend

# 2. Static Resources (Keep this if you ever put files in /static)
spring.web.resources.static-locations=classpath:/static/

# 3. Mail Configuration (Optimized for Render Cloud)
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_PASSWORD}

# 4. SSL Configuration (Gmail Port 465 Protocol)
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.socketFactory.port=465
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# 5. Recipient Email (Saves the message to your own inbox)
portfolio.contact.recipient=${GMAIL_USERNAME}

# 6. Handling Timeouts (Prevents the server from hanging)
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# 7. CORS Security (Updated for Local and Live environments)
portfolio.cors.allowed-origins=http://localhost:63342,https://sourabhawate74.github.io